<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Just Go · App do Visitante — Festival Canaã Cidade Junina</title>
  <meta name="description" content="App oficial do visitante · Festival Canaã Cidade Junina, powered by Just Go." />
  <meta name="theme-color" content="#07090d" />
  <link rel="icon" href="../assets/logo-justgo.avif" type="image/avif" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css?v=2" />
</head>
<body>

<div class="app" id="app">

  <!-- ══════════ SPLASH ══════════ -->
  <div class="splash" id="splash">
    <div class="splash-logo">
      <div class="splash-tile">
        <img src="../assets/logo-justgo.jpg" alt="Just Go" />
      </div>
      <div class="splash-ring"></div>
    </div>
    <p class="splash-tag">Seu evento. Mais inteligente.</p>
    <div class="splash-event">🎪 Festival Canaã Cidade Junina</div>
  </div>

  <!-- ══════════ STATUS BAR + HEADER ══════════ -->
  <div class="statusbar"><span id="clock">21:34</span><span class="sb-icons">📶 🔋</span></div>

  <header class="app-header">
    <span class="header-brand">
      <img src="../assets/logo-justgo.jpg" alt="Just Go" />
    </span>
    <div class="header-right">
      <button class="icon-btn" id="btnSearch" aria-label="Buscar">🔍</button>
      <button class="icon-btn has-dot" id="btnBell" aria-label="Notificações">🔔</button>
    </div>
  </header>

  <!-- ══════════ TELAS ══════════ -->
  <main class="screens" id="screens"><!-- renderizado via JS --></main>

  <!-- ══════════ BOTTOM NAV ══════════ -->
  <nav class="bottomnav" id="bottomnav">
    <button data-go="home" class="active"><i>🏠</i><span>Início</span></button>
    <button data-go="agenda"><i>📅</i><span>Agenda</span></button>
    <button data-go="ia" class="nav-ai" aria-label="Go AI"><b>AI</b></button>
    <button data-go="mapa"><i>🗺️</i><span>Mapa</span></button>
    <button data-go="perfil"><i>👤</i><span>Perfil</span></button>
  </nav>

  <!-- ══════════ MODAL EMERGÊNCIA ══════════ -->
  <div class="modal" id="modalSos" hidden>
    <div class="modal-card">
      <div class="sos-pulse">🚑</div>
      <h3>Emergência</h3>
      <p>Sua localização será enviada à equipe médica mais próxima do seu setor.</p>
      <button class="btn-gold btn-block" id="sosConfirm">Chamar equipe agora</button>
      <button class="btn-outline btn-block" data-close>Cancelar</button>
    </div>
  </div>

  <!-- ══════════ TOAST ══════════ -->
  <div class="toast" id="toast" hidden></div>
</div>

<script src="app.js?v=2"></script>
</body>
</html>
